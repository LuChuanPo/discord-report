<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="AI Supabase data analysis workflow: question, plan review, cross-source execution across Supabase, S3, and CSV, verification, explanation, and the write-back loop that inserts a verified analysis result into a Supabase table.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F5F3FF"/>
    </linearGradient>
    <linearGradient id="agentFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5B5BFF"/>
      <stop offset="1" stop-color="#3E2EDB"/>
    </linearGradient>
    <linearGradient id="supaFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3ECF8E"/>
      <stop offset="1" stop-color="#1F8F5F"/>
    </linearGradient>
    <linearGradient id="writeFill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FEF3C7"/>
      <stop offset="1" stop-color="#FBBF24"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#0B1220" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5B5BFF"/>
    </marker>
    <marker id="arrowBack" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#B45309"/>
    </marker>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="60" y="58" font-family="Inter, sans-serif" font-size="26" font-weight="800" fill="#0A0A0A">AI data analysis on Supabase — analyze, then write back</text>
  <text x="60" y="86" font-family="Inter, sans-serif" font-size="15" font-weight="500" fill="#6B7280">Plan · execute · verify · explain — with an optional write-back loop into a Supabase table.</text>

  <!-- Stage 1: Question -->
  <g filter="url(#softShadow)">
    <rect x="60" y="130" width="180" height="100" rx="14" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>
    <text x="150" y="160" font-family="Inter, sans-serif" font-size="11" font-weight="800" fill="#6B7280" text-anchor="middle">QUESTION</text>
    <text x="150" y="184" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#0A0A0A" text-anchor="middle">"Analyze feedback</text>
    <text x="150" y="202" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#0A0A0A" text-anchor="middle">across Supabase</text>
    <text x="150" y="220" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#0A0A0A" text-anchor="middle">and S3"</text>
  </g>

  <!-- Stage 2: Plan -->
  <g filter="url(#softShadow)">
    <rect x="280" y="130" width="180" height="100" rx="14" fill="#FFFFFF" stroke="#5B5BFF" stroke-width="1.5"/>
    <text x="370" y="160" font-family="Inter, sans-serif" font-size="11" font-weight="800" fill="#3E2EDB" text-anchor="middle">PLAN</text>
    <text x="370" y="184" font-family="Inter, sans-serif" font-size="13" fill="#4B5563" text-anchor="middle">Retrieve KB definitions</text>
    <text x="370" y="202" font-family="Inter, sans-serif" font-size="13" fill="#4B5563" text-anchor="middle">Retrieve schema</text>
    <text x="370" y="220" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#3E2EDB" text-anchor="middle">Human approves ↵</text>
  </g>

  <!-- Stage 3: Execute (big central, taller) -->
  <g filter="url(#softShadow)">
    <rect x="500" y="130" width="240" height="270" rx="14" fill="url(#agentFill)"/>
    <text x="620" y="160" font-family="Inter, sans-serif" font-size="11" font-weight="800" fill="#FFFFFF" text-anchor="middle">EXECUTE — CROSS-SOURCE</text>

    <!-- Supabase pill -->
    <rect x="520" y="180" width="200" height="50" rx="10" fill="url(#supaFill)"/>
    <text x="620" y="200" font-family="Inter, sans-serif" font-size="13" font-weight="800" fill="#FFFFFF" text-anchor="middle">Supabase Postgres</text>
    <text x="620" y="218" font-family="Inter, sans-serif" font-size="11" fill="#E0F2EA" text-anchor="middle">auth.users · public.events · public.feedback</text>

    <!-- S3 pill -->
    <rect x="520" y="240" width="95" height="50" rx="10" fill="#FFFFFF"/>
    <text x="567" y="260" font-family="Inter, sans-serif" font-size="13" font-weight="800" fill="#0A0A0A" text-anchor="middle">S3 logs</text>
    <text x="567" y="278" font-family="Inter, sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">JSON · Parquet</text>

    <!-- CSV pill -->
    <rect x="625" y="240" width="95" height="50" rx="10" fill="#FFFFFF"/>
    <text x="672" y="260" font-family="Inter, sans-serif" font-size="13" font-weight="800" fill="#0A0A0A" text-anchor="middle">CSV</text>
    <text x="672" y="278" font-family="Inter, sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">channel cost</text>

    <text x="620" y="320" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">Join in the execution layer —</text>
    <text x="620" y="338" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">no ETL prerequisite</text>
    <text x="620" y="370" font-family="Inter, sans-serif" font-size="11" fill="#C7C7FF" text-anchor="middle">Read-only role · query logging</text>
  </g>

  <!-- Stage 4: Verify -->
  <g filter="url(#softShadow)">
    <rect x="780" y="130" width="180" height="100" rx="14" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>
    <text x="870" y="160" font-family="Inter, sans-serif" font-size="11" font-weight="800" fill="#6B7280" text-anchor="middle">VERIFY</text>
    <text x="870" y="184" font-family="Inter, sans-serif" font-size="13" fill="#4B5563" text-anchor="middle">Row counts</text>
    <text x="870" y="202" font-family="Inter, sans-serif" font-size="13" fill="#4B5563" text-anchor="middle">Null rates</text>
    <text x="870" y="220" font-family="Inter, sans-serif" font-size="13" fill="#4B5563" text-anchor="middle">Second-path check</text>
  </g>

  <!-- Stage 5: Explain -->
  <g filter="url(#softShadow)">
    <rect x="1000" y="130" width="160" height="100" rx="14" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>
    <text x="1080" y="160" font-family="Inter, sans-serif" font-size="11" font-weight="800" fill="#6B7280" text-anchor="middle">EXPLAIN</text>
    <text x="1080" y="184" font-family="Inter, sans-serif" font-size="13" fill="#4B5563" text-anchor="middle">Answer + plan</text>
    <text x="1080" y="202" font-family="Inter, sans-serif" font-size="13" fill="#4B5563" text-anchor="middle">Queries run</text>
    <text x="1080" y="220" font-family="Inter, sans-serif" font-size="13" fill="#4B5563" text-anchor="middle">Sources cited</text>
  </g>

  <!-- Arrows for analysis flow -->
  <g fill="none" stroke="#5B5BFF" stroke-width="2.5" marker-end="url(#arrow)">
    <line x1="240" y1="180" x2="278" y2="180"/>
    <line x1="460" y1="180" x2="498" y2="180"/>
    <line x1="740" y1="180" x2="778" y2="180"/>
    <line x1="960" y1="180" x2="998" y2="180"/>
  </g>

  <!-- Write-back loop -->
  <g filter="url(#softShadow)">
    <rect x="60" y="450" width="1100" height="130" rx="16" fill="url(#writeFill)" opacity="0.55"/>
    <rect x="60" y="450" width="1100" height="130" rx="16" fill="none" stroke="#B45309" stroke-width="2" stroke-dasharray="6 4"/>
  </g>

  <text x="80" y="478" font-family="Inter, sans-serif" font-size="12" font-weight="800" fill="#92400E">WRITE-BACK LOOP — OPT-IN, PLAN-APPROVED, SCOPED WRITE ROLE</text>

  <!-- Write-back stages -->
  <g filter="url(#softShadow)">
    <rect x="80" y="495" width="200" height="70" rx="10" fill="#FFFFFF" stroke="#FCD34D" stroke-width="1.5"/>
    <text x="180" y="518" font-family="Inter, sans-serif" font-size="13" font-weight="800" fill="#0A0A0A" text-anchor="middle">Auto-detect schema</text>
    <text x="180" y="540" font-family="Inter, sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">theme · sentiment · count</text>
    <text x="180" y="556" font-family="Inter, sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">example_quote · period</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="300" y="495" width="200" height="70" rx="10" fill="#FFFFFF" stroke="#FCD34D" stroke-width="1.5"/>
    <text x="400" y="518" font-family="Inter, sans-serif" font-size="13" font-weight="800" fill="#0A0A0A" text-anchor="middle">Match or CREATE</text>
    <text x="400" y="540" font-family="Inter, sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">public.feedback_</text>
    <text x="400" y="556" font-family="Inter, sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">monthly_summary</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="520" y="495" width="200" height="70" rx="10" fill="#FFFFFF" stroke="#FCD34D" stroke-width="1.5"/>
    <text x="620" y="518" font-family="Inter, sans-serif" font-size="13" font-weight="800" fill="#0A0A0A" text-anchor="middle">Plan-mode approval</text>
    <text x="620" y="540" font-family="Inter, sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">columns · row count</text>
    <text x="620" y="556" font-family="Inter, sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">write role confirmed</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="740" y="495" width="200" height="70" rx="10" fill="#FFFFFF" stroke="#FCD34D" stroke-width="1.5"/>
    <text x="840" y="518" font-family="Inter, sans-serif" font-size="13" font-weight="800" fill="#0A0A0A" text-anchor="middle">Normalize + INSERT</text>
    <text x="840" y="540" font-family="Inter, sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">cast types · escape text</text>
    <text x="840" y="556" font-family="Inter, sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">upsert on conflict</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="960" y="495" width="200" height="70" rx="10" fill="url(#supaFill)"/>
    <text x="1060" y="518" font-family="Inter, sans-serif" font-size="13" font-weight="800" fill="#FFFFFF" text-anchor="middle">New Supabase table</text>
    <text x="1060" y="540" font-family="Inter, sans-serif" font-size="11" fill="#E0F2EA" text-anchor="middle">readable by app · BI ·</text>
    <text x="1060" y="556" font-family="Inter, sans-serif" font-size="11" fill="#E0F2EA" text-anchor="middle">next agent question</text>
  </g>

  <!-- Arrows for write-back -->
  <g fill="none" stroke="#B45309" stroke-width="2.5" marker-end="url(#arrowBack)">
    <line x1="280" y1="530" x2="298" y2="530"/>
    <line x1="500" y1="530" x2="518" y2="530"/>
    <line x1="720" y1="530" x2="738" y2="530"/>
    <line x1="940" y1="530" x2="958" y2="530"/>
  </g>

  <!-- Connector from Explain to write-back start -->
  <g fill="none" stroke="#B45309" stroke-width="2" stroke-dasharray="4 5">
    <path d="M 1080 232 Q 1080 380 180 380 Q 180 420 180 488" marker-end="url(#arrowBack)"/>
  </g>
  <text x="640" y="408" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#B45309" text-anchor="middle">"Please write this report into the Supabase database"</text>

  <text x="600" y="605" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#6B7280" text-anchor="middle">Read-only by default · separate write role for write-back · RLS preserved · every step logged in the evidence trail</text>
</svg>

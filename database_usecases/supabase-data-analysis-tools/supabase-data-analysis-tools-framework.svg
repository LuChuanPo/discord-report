<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Five Supabase data analysis tool categories arranged around a central Supabase Postgres core: Studio and SQL editor, native Postgres clients, BI tools, foreign data wrappers, and AI database query agents.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F5F3FF"/>
    </linearGradient>
    <linearGradient id="coreFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3ECF8E"/>
      <stop offset="1" stop-color="#1F8F5F"/>
    </linearGradient>
    <linearGradient id="aiFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5B5BFF"/>
      <stop offset="1" stop-color="#3E2EDB"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#0B1220" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="60" y="64" font-family="Inter, sans-serif" font-size="28" font-weight="800" fill="#0A0A0A">Five categories of Supabase data analysis tools</text>
  <text x="60" y="94" font-family="Inter, sans-serif" font-size="16" font-weight="500" fill="#6B7280">Anything that speaks the Postgres protocol works — pick by question shape and source spread.</text>

  <!-- Central Supabase Postgres core -->
  <g filter="url(#softShadow)">
    <circle cx="600" cy="360" r="120" fill="url(#coreFill)"/>
    <text x="600" y="345" font-family="Inter, sans-serif" font-size="20" font-weight="800" fill="#FFFFFF" text-anchor="middle">Supabase</text>
    <text x="600" y="373" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#FFFFFF" text-anchor="middle">Postgres database</text>
    <text x="600" y="395" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#E0F2EA" text-anchor="middle">auth · public · storage · realtime</text>
  </g>

  <!-- Connecting lines from core to each category -->
  <g stroke="#C7CEDA" stroke-width="2" stroke-dasharray="4 6" fill="none">
    <line x1="600" y1="240" x2="600" y2="180"/>
    <line x1="498" y1="305" x2="280" y2="220"/>
    <line x1="498" y1="415" x2="280" y2="490"/>
    <line x1="702" y1="415" x2="920" y2="490"/>
    <line x1="702" y1="305" x2="920" y2="220"/>
  </g>

  <!-- Category 1: Studio + SQL (top center) -->
  <g filter="url(#softShadow)">
    <rect x="465" y="135" width="270" height="92" rx="14" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>
    <circle cx="500" cy="166" r="14" fill="#ECFDF5"/>
    <text x="500" y="171" font-family="Inter, sans-serif" font-size="14" font-weight="800" fill="#047857" text-anchor="middle">1</text>
    <text x="525" y="170" font-family="Inter, sans-serif" font-size="17" font-weight="800" fill="#0A0A0A">Studio + SQL editor</text>
    <text x="525" y="194" font-family="Inter, sans-serif" font-size="13" fill="#6B7280">Native · ad-hoc SQL · table editor</text>
    <text x="525" y="212" font-family="Inter, sans-serif" font-size="12" fill="#9CA3AF">Best for: project owners</text>
  </g>

  <!-- Category 2: Postgres clients (top left) -->
  <g filter="url(#softShadow)">
    <rect x="60" y="135" width="270" height="92" rx="14" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>
    <circle cx="95" cy="166" r="14" fill="#EFF6FF"/>
    <text x="95" y="171" font-family="Inter, sans-serif" font-size="14" font-weight="800" fill="#1D4ED8" text-anchor="middle">2</text>
    <text x="120" y="170" font-family="Inter, sans-serif" font-size="17" font-weight="800" fill="#0A0A0A">Postgres clients</text>
    <text x="120" y="194" font-family="Inter, sans-serif" font-size="13" fill="#6B7280">psql · DBeaver · TablePlus</text>
    <text x="120" y="212" font-family="Inter, sans-serif" font-size="12" fill="#9CA3AF">Best for: power users, DBAs</text>
  </g>

  <!-- Category 3: BI tools (bottom left) -->
  <g filter="url(#softShadow)">
    <rect x="60" y="453" width="270" height="92" rx="14" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>
    <circle cx="95" cy="484" r="14" fill="#FEF3C7"/>
    <text x="95" y="489" font-family="Inter, sans-serif" font-size="14" font-weight="800" fill="#B45309" text-anchor="middle">3</text>
    <text x="120" y="488" font-family="Inter, sans-serif" font-size="17" font-weight="800" fill="#0A0A0A">BI tools</text>
    <text x="120" y="512" font-family="Inter, sans-serif" font-size="13" fill="#6B7280">Metabase · Superset · Tableau</text>
    <text x="120" y="530" font-family="Inter, sans-serif" font-size="12" fill="#9CA3AF">Best for: shared dashboards</text>
  </g>

  <!-- Category 4: Foreign data wrappers (bottom right) -->
  <g filter="url(#softShadow)">
    <rect x="870" y="453" width="270" height="92" rx="14" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>
    <circle cx="905" cy="484" r="14" fill="#FCE7F3"/>
    <text x="905" y="489" font-family="Inter, sans-serif" font-size="14" font-weight="800" fill="#BE185D" text-anchor="middle">4</text>
    <text x="930" y="488" font-family="Inter, sans-serif" font-size="17" font-weight="800" fill="#0A0A0A">Foreign data wrappers</text>
    <text x="930" y="512" font-family="Inter, sans-serif" font-size="13" fill="#6B7280">Federate external tables in SQL</text>
    <text x="930" y="530" font-family="Inter, sans-serif" font-size="12" fill="#9CA3AF">Best for: "one DB" architecture</text>
  </g>

  <!-- Category 5: AI agents (top right) — highlighted -->
  <g filter="url(#softShadow)">
    <rect x="870" y="135" width="270" height="92" rx="14" fill="url(#aiFill)" stroke="#3E2EDB" stroke-width="1.5"/>
    <circle cx="905" cy="166" r="14" fill="#FFFFFF" opacity="0.95"/>
    <text x="905" y="171" font-family="Inter, sans-serif" font-size="14" font-weight="800" fill="#3E2EDB" text-anchor="middle">5</text>
    <text x="930" y="170" font-family="Inter, sans-serif" font-size="17" font-weight="800" fill="#FFFFFF">AI database query</text>
    <text x="930" y="194" font-family="Inter, sans-serif" font-size="13" fill="#E0E0FF">Plan · execute · verify · explain</text>
    <text x="930" y="212" font-family="Inter, sans-serif" font-size="12" fill="#C7C7FF">Best for: cross-source questions</text>
  </g>

  <!-- External sources flowing into AI agent -->
  <g stroke="#5B5BFF" stroke-width="2" stroke-dasharray="3 4" fill="none">
    <path d="M 1005 90 L 1005 135"/>
    <path d="M 1075 90 L 1075 135"/>
    <path d="M 935 90 L 935 135"/>
  </g>

  <g font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#3E2EDB" text-anchor="middle">
    <rect x="905" y="58" width="60" height="26" rx="6" fill="#EEF2FF" stroke="#C7C7FF"/>
    <text x="935" y="75">S3</text>
    <rect x="975" y="58" width="60" height="26" rx="6" fill="#EEF2FF" stroke="#C7C7FF"/>
    <text x="1005" y="75">CSV</text>
    <rect x="1045" y="58" width="60" height="26" rx="6" fill="#EEF2FF" stroke="#C7C7FF"/>
    <text x="1075" y="75">MySQL</text>
  </g>

  <!-- Footer label -->
  <text x="600" y="595" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#6B7280" text-anchor="middle">Postgres connection string is the bridge — every category reaches Supabase the same way.</text>
</svg>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>每日工作汇报</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f4f1ea;
      --ink: #1a1a1a;
      --accent: #d4422f;
      --muted: #6b6660;
      --line: #1a1a1a;
      --paper: #ffffff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Fraunces', Georgia, serif;
      min-height: 100vh;
      padding: 40px 20px;
      background-image:
        radial-gradient(circle at 20% 30%, rgba(212, 66, 47, 0.04) 0%, transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(26, 26, 26, 0.03) 0%, transparent 40%);
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 48px;
      border-bottom: 2px solid var(--line);
      padding-bottom: 24px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }

    h1 {
      font-size: 56px;
      font-weight: 800;
      letter-spacing: -2px;
      line-height: 0.95;
    }

    .date-stamp {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .form-card {
      background: var(--paper);
      border: 2px solid var(--line);
      padding: 40px;
      box-shadow: 8px 8px 0 var(--line);
    }

    .field {
      margin-bottom: 28px;
    }

    label {
      display: block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 8px;
      color: var(--muted);
    }

    label .required {
      color: var(--accent);
      margin-left: 4px;
    }

    input[type="text"],
    input[type="date"],
    input[type="datetime-local"],
    input[type="url"],
    textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--ink);
      background: transparent;
      font-family: 'Fraunces', Georgia, serif;
      font-size: 16px;
      color: var(--ink);
      transition: all 0.2s;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
      background: rgba(212, 66, 47, 0.03);
    }

    textarea {
      resize: vertical;
      min-height: 100px;
      line-height: 1.5;
    }

    input[type="file"] {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      padding: 8px 0;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    button {
      width: 100%;
      padding: 16px;
      background: var(--ink);
      color: var(--bg);
      border: none;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 12px;
    }

    button:hover:not(:disabled) {
      background: var(--accent);
      transform: translate(-2px, -2px);
      box-shadow: 4px 4px 0 var(--ink);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .status {
      margin-top: 20px;
      padding: 14px 18px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      display: none;
    }

    .status.success {
      display: block;
      background: #e8f5e9;
      border-left: 4px solid #2e7d32;
      color: #2e7d32;
    }

    .status.error {
      display: block;
      background: #ffebee;
      border-left: 4px solid var(--accent);
      color: var(--accent);
    }

    .preview {
      margin-top: 12px;
      max-width: 200px;
      border: 1px solid var(--line);
      display: none;
    }

    .preview.show { display: block; }

    @media (max-width: 600px) {
      h1 { font-size: 40px; }
      .row { grid-template-columns: 1fr; }
      .form-card { padding: 24px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Daily<br>Report.</h1>
      <div class="date-stamp" id="todayStamp"></div>
    </header>

    <div class="form-card">
      <form id="reportForm">
        <div class="row">
          <div class="field">
            <label>汇报日期 <span class="required">*</span></label>
            <input type="date" id="reportDate" required />
          </div>
          <div class="field">
            <label>负责人 <span class="required">*</span></label>
            <input type="text" id="owner" placeholder="张三" required />
          </div>
        </div>

        <div class="field">
          <label>工作描述 <span class="required">*</span></label>
          <textarea id="description" placeholder="今天完成了哪些工作..." required></textarea>
        </div>

        <div class="field">
          <label>成果链接</label>
          <input type="url" id="resultLink" placeholder="https://..." />
        </div>

        <div class="field">
          <label>成果图片</label>
          <input type="file" id="imageFile" accept="image/*" />
          <img class="preview" id="imagePreview" />
        </div>

        <div class="field">
          <label>完成时间</label>
          <input type="datetime-local" id="completedAt" />
        </div>

        <div class="field">
          <label>下一步计划</label>
          <textarea id="nextPlan" placeholder="明天打算做..."></textarea>
        </div>

        <button type="submit" id="submitBtn">提交汇报 →</button>
        <div class="status" id="status"></div>
      </form>
    </div>
  </div>

  <script type="module">
    // ===== 1. 引入 Supabase 客户端（CDN 方式，不用 npm）=====
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

        // ===== 2. 配置：换成你自己的 =====
    const SUPABASE_URL = 'https://foyokflqyojoyzuvtsbe.supabase.co'
    const SUPABASE_ANON_KEY = 'sb_publishable_NQcPR-u4KwecKeHgxS9rfA_3uZEUjhe'

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

    // ===== 3. 初始化页面 =====
    const today = new Date()
    document.getElementById('reportDate').value = today.toISOString().split('T')[0]
    document.getElementById('todayStamp').textContent =
      today.toISOString().split('T')[0].replace(/-/g, ' / ')

    // 图片预览
    const imageFile = document.getElementById('imageFile')
    const imagePreview = document.getElementById('imagePreview')
    imageFile.addEventListener('change', (e) => {
      const file = e.target.files[0]
      if (file) {
        imagePreview.src = URL.createObjectURL(file)
        imagePreview.classList.add('show')
      } else {
        imagePreview.classList.remove('show')
      }
    })

    // ===== 4. 表单提交 =====
    const form = document.getElementById('reportForm')
    const submitBtn = document.getElementById('submitBtn')
    const statusEl = document.getElementById('status')

    form.addEventListener('submit', async (e) => {
      e.preventDefault()
      submitBtn.disabled = true
      submitBtn.textContent = '提交中...'
      statusEl.className = 'status'

      try {
        // 4.1 如果有图片，先上传到 Storage
        let imageUrl = null
        const file = imageFile.files[0]
      if (file) {
        // 文件名用时间戳+随机串，避免中文/空格等非法字符
        const fileExt = file.name.split('.').pop()
        const fileName = `${Date.now()}-${Math.random().toString(36).slice(2, 8)}.${fileExt}`
        const { data: uploadData, error: uploadError } = await supabase
            .storage
            .from('report-images')
            .upload(fileName, file)

          if (uploadError) throw uploadError

          // 拿到公开访问 URL
          const { data: urlData } = supabase
            .storage
            .from('report-images')
            .getPublicUrl(fileName)

          imageUrl = urlData.publicUrl
        }

        // 4.2 组装数据
        const completedAtVal = document.getElementById('completedAt').value
        const payload = {
          report_date: document.getElementById('reportDate').value,
          owner: document.getElementById('owner').value,
          description: document.getElementById('description').value,
          result_link: document.getElementById('resultLink').value || null,
          image_url: imageUrl,
          completed_at: completedAtVal ? new Date(completedAtVal).toISOString() : null,
          next_plan: document.getElementById('nextPlan').value || null
        }

        // 4.3 插入数据库
        const { data, error } = await supabase
          .from('work_reports')
          .insert([payload])
          .select()

        if (error) throw error

        // 成功提示
        statusEl.className = 'status success'
        statusEl.textContent = `✓ 提交成功！记录 ID: ${data[0].id.slice(0, 8)}...`
        form.reset()
        imagePreview.classList.remove('show')
        document.getElementById('reportDate').value = today.toISOString().split('T')[0]

      } catch (err) {
        console.error(err)
        statusEl.className = 'status error'
        statusEl.textContent = `✗ 提交失败: ${err.message}`
      } finally {
        submitBtn.disabled = false
        submitBtn.textContent = '提交汇报 →'
      }
    })
  </script>
</body>
</html>

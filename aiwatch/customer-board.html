<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>QVeris · 您的专属进度看板 — AIWATCH</title>
<link rel="stylesheet" href="shared/tokens.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="shared/data.js"></script>
<script type="text/babel" src="shared/icons.js"></script>
<script type="text/babel" src="shared/components.jsx"></script>
<style>
  /* Customer-facing variant: same dark techy palette but softer, gentler, more whitespace */
  body {
    background-image:
      radial-gradient(ellipse 100% 50% at 50% -10%, rgba(0, 229, 255, 0.05), transparent 60%),
      radial-gradient(ellipse 80% 50% at 100% 100%, rgba(179, 136, 255, 0.04), transparent 60%);
  }
  .cb-shell { max-width: 1180px; margin: 0 auto; padding: 32px 24px 80px; }

  /* Header */
  .cb-head {
    background: linear-gradient(180deg, rgba(0,229,255,0.05), transparent 100%);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px 36px;
    margin-bottom: 28px;
    position: relative;
    overflow: hidden;
  }
  .cb-head::before {
    content: "";
    position: absolute;
    top: -1px; left: 10%; right: 10%; height: 1px;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    opacity: 0.5;
  }
  .cb-head__top { display: flex; justify-content: space-between; align-items: flex-start; gap: 24px; flex-wrap: wrap; }
  .cb-head__brand { display: flex; align-items: center; gap: 16px; }
  .cb-head__logo {
    width: 60px; height: 60px;
    background: var(--bg-elev);
    border: 1px solid var(--border-cyan);
    color: var(--cyan);
    border-radius: 12px;
    display: grid; place-items: center;
    font-family: var(--font-mono); font-weight: 700; font-size: 24px;
    box-shadow: 0 0 24px rgba(0,229,255,0.2);
  }
  .cb-head__title { font-family: var(--font-mono); font-size: 24px; font-weight: 600; color: var(--ink); letter-spacing: -0.01em; margin: 0; }
  .cb-head__sub { font-size: 13px; color: var(--ink-3); margin-top: 6px; }
  .cb-head__meta {
    display: flex; gap: 16px; align-items: center;
    font-family: var(--font-mono); font-size: 11px; color: var(--ink-3);
  }
  .cb-watermark {
    margin-top: 18px;
    padding-top: 18px;
    border-top: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
    font-family: var(--font-mono); font-size: 11px; color: var(--ink-3);
  }

  /* KPI tiles — softer than internal */
  .cb-kpi {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 22px;
    position: relative;
    overflow: hidden;
  }
  .cb-kpi__num { font-family: var(--font-mono); font-size: 40px; font-weight: 600; color: var(--ink); letter-spacing: -0.03em; line-height: 1; margin-top: 8px; }
  .cb-kpi__label { font-family: var(--font-mono); font-size: 11px; color: var(--ink-3); letter-spacing: 0.06em; text-transform: uppercase; }
  .cb-kpi__hint { font-family: var(--font-mono); font-size: 10px; color: var(--ink-4); margin-top: 8px; }
  .cb-kpi--cyan .cb-kpi__num { color: var(--cyan); }
  .cb-kpi--purple .cb-kpi__num { color: var(--purple); }
  .cb-kpi--success .cb-kpi__num { color: var(--success); }
  .cb-kpi::after {
    content: ""; position: absolute; top: 0; right: 0;
    width: 80px; height: 80px;
    background: radial-gradient(circle at top right, var(--cyan-glow), transparent 70%);
    pointer-events: none;
  }
  .cb-kpi--purple::after { background: radial-gradient(circle at top right, var(--purple-glow), transparent 70%); }
  .cb-kpi--success::after { background: radial-gradient(circle at top right, rgba(0,217,163,0.12), transparent 70%); }

  /* Section heading */
  .cb-section-h {
    display: flex; align-items: baseline; gap: 12px;
    margin: 36px 0 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .cb-section-h h2 { font-family: var(--font-mono); font-size: 16px; font-weight: 600; margin: 0; }
  .cb-section-h .accent { color: var(--cyan); }
  .cb-section-h__sub { font-size: 12px; color: var(--ink-3); }
  .cb-section-h .right { margin-left: auto; font-family: var(--font-mono); font-size: 11px; color: var(--ink-3); }

  /* TIMELINE — the centerpiece */
  .timeline { position: relative; padding-left: 24px; margin-top: 8px; }
  .timeline::before {
    content: ""; position: absolute; left: 7px; top: 8px; bottom: 8px;
    width: 1px;
    background: linear-gradient(180deg, var(--cyan) 0%, var(--purple) 50%, transparent 100%);
    opacity: 0.4;
  }
  .tl-item { position: relative; margin-bottom: 28px; }
  .tl-item::before {
    content: "";
    position: absolute; left: -24px; top: 18px;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--bg);
    border: 2px solid var(--cyan);
    box-shadow: 0 0 12px rgba(0,229,255,0.4);
    z-index: 1;
  }
  .tl-item--purple::before { border-color: var(--purple); box-shadow: 0 0 12px rgba(179,136,255,0.4); }
  .tl-item--success::before { border-color: var(--success); box-shadow: 0 0 12px rgba(0,217,163,0.4); }
  .tl-item--warn::before { border-color: var(--warning); box-shadow: 0 0 12px rgba(255,149,0,0.4); }

  .tl-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 22px;
    transition: all 0.2s;
  }
  .tl-card:hover { border-color: var(--border-cyan); transform: translateX(2px); }
  .tl-card__top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 8px; }
  .tl-card__date { font-family: var(--font-mono); font-size: 11px; color: var(--ink-3); }
  .tl-card__title { font-size: 15px; font-weight: 500; color: var(--ink); margin: 6px 0 4px; line-height: 1.5; }
  .tl-card__detail { font-size: 13px; color: var(--ink-2); line-height: 1.7; }
  .tl-card__metrics {
    display: flex; gap: 18px; flex-wrap: wrap;
    margin-top: 14px; padding-top: 12px;
    border-top: 1px dashed var(--border);
  }
  .tl-metric .v { font-family: var(--font-mono); font-size: 18px; font-weight: 600; color: var(--cyan); letter-spacing: -0.01em; }
  .tl-metric .l { font-family: var(--font-mono); font-size: 10px; color: var(--ink-3); letter-spacing: 0.04em; text-transform: uppercase; margin-top: 2px; }

  .tl-card__images {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 8px;
    margin-top: 12px;
  }
  .tl-img {
    aspect-ratio: 4/3;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid var(--border);
    position: relative;
    background: var(--bg-elev);
  }

  .tl-tag {
    display: inline-flex;
    align-items: center; gap: 5px;
    padding: 3px 9px;
    border-radius: 999px;
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.04em;
    background: var(--cyan-glow);
    color: var(--cyan);
    border: 1px solid var(--border-cyan);
  }
  .tl-tag--purple { background: var(--purple-glow); color: var(--purple); border-color: var(--border-purple); }
  .tl-tag--success { background: rgba(0,217,163,0.1); color: var(--success); border-color: rgba(0,217,163,0.3); }
  .tl-tag--warn { background: rgba(255,149,0,0.1); color: var(--warning); border-color: rgba(255,149,0,0.3); }

  /* Needs progress */
  .need-row {
    display: grid; grid-template-columns: 1fr auto;
    gap: 14px; padding: 14px 0;
    border-bottom: 1px solid var(--border);
    align-items: center;
  }
  .need-row:last-child { border-bottom: none; }
  .need-row__title { font-size: 13.5px; color: var(--ink); margin-bottom: 6px; }
  .need-row__bar { height: 4px; background: var(--bg-elev); border-radius: 2px; overflow: hidden; max-width: 360px; }
  .need-row__fill { height: 100%; border-radius: 2px; transition: width 0.4s ease-out; }

  /* Next plan */
  .plan-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .plan-cell {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    position: relative;
    overflow: hidden;
  }
  .plan-cell--current { border-color: var(--cyan); background: linear-gradient(180deg, var(--cyan-glow), var(--surface) 60%); }
  .plan-cell__week { font-family: var(--font-mono); font-size: 11px; color: var(--ink-3); letter-spacing: 0.08em; }
  .plan-cell--current .plan-cell__week { color: var(--cyan); }
  .plan-cell__title { font-size: 13px; color: var(--ink); margin: 8px 0; font-weight: 500; }
  .plan-cell__bullets { font-size: 11.5px; color: var(--ink-2); line-height: 1.7; }
  .plan-cell__bullets li { margin-bottom: 4px; }

  /* Meeting list */
  .mt-row {
    display: grid; grid-template-columns: 88px 1fr auto;
    gap: 16px; padding: 16px 0;
    border-bottom: 1px solid var(--border);
    align-items: center;
    cursor: pointer;
    transition: padding 0.15s;
  }
  .mt-row:hover { padding-left: 8px; }
  .mt-row:last-child { border-bottom: none; }
  .mt-row__date { font-family: var(--font-mono); font-size: 12px; color: var(--ink-3); }
  .mt-row__date strong { display: block; color: var(--cyan); font-size: 16px; font-weight: 600; }

  .footer-line {
    margin-top: 56px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    text-align: center;
    color: var(--ink-4);
    font-family: var(--font-mono);
    font-size: 11px;
    line-height: 1.8;
  }
  .footer-line a { color: var(--ink-3); }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState } = React;
const { customers, customerTimeline, customerNeeds, meetings } = window.AIWATCH_DATA;

function App() {
  const customer = customers.find(c => c.id === 'qveris');
  const [filter, setFilter] = useState('all'); // all | content | event | consulting | connect

  const kindMeta = {
    content:    { tag: '内容产出',  cls: 'tl-tag',          itemCls: '' },
    event:      { tag: '活动 / 试讲', cls: 'tl-tag tl-tag--warn', itemCls: 'tl-item--warn' },
    consulting: { tag: '咨询交付',  cls: 'tl-tag tl-tag--purple', itemCls: 'tl-item--purple' },
    connect:    { tag: '资源对接',  cls: 'tl-tag tl-tag--success', itemCls: 'tl-item--success' },
  };

  const filtered = customerTimeline.filter(t => filter === 'all' || t.kind === filter);

  return (
    <div className="cb-shell">

      {/* Header */}
      <div className="cb-head">
        <div className="cb-head__top">
          <div className="cb-head__brand">
            <div className="cb-head__logo">{customer.logo}</div>
            <div>
              <h1 className="cb-head__title">{customer.name.split(' / ')[1] || customer.name}</h1>
              <div className="cb-head__sub">您的专属进度看板 · 由 AIWATCH 提供</div>
            </div>
          </div>
          <div className="cb-head__meta">
            <span>合作开始 2026-03-22</span>
            <span style={{color:'var(--ink-4)'}}>·</span>
            <span>负责团队 李逸航 · 陈默</span>
            <span style={{color:'var(--ink-4)'}}>·</span>
            <button className="btn btn--sm" style={{padding:'4px 10px'}}><Icon name="refresh" size={11}/> 刷新</button>
          </div>
        </div>
        <div className="cb-watermark">
          <span>当前位于 <span style={{color:'var(--cyan)'}}>第 6 周 · 质量提升阶段</span> · 距下次会议 2026-05-09 还有 5 天</span>
          <span>最后更新 · 2026-05-04 14:32</span>
        </div>
      </div>

      {/* KPI */}
      <div className="grid" style={{gridTemplateColumns: 'repeat(4, 1fr)', gap: 12}}>
        <div className="cb-kpi cb-kpi--cyan">
          <div className="cb-kpi__label">已合作周数</div>
          <div className="cb-kpi__num">6 <span style={{fontSize:18,color:'var(--ink-3)'}}>/12</span></div>
          <div className="cb-kpi__hint">合作进度 50%</div>
        </div>
        <div className="cb-kpi cb-kpi--purple">
          <div className="cb-kpi__label">累计交付物</div>
          <div className="cb-kpi__num">{customerTimeline.length}</div>
          <div className="cb-kpi__hint">含内容 · 咨询 · 对接 · 活动</div>
        </div>
        <div className="cb-kpi cb-kpi--success">
          <div className="cb-kpi__label">本周已完成</div>
          <div className="cb-kpi__num">7 <span style={{fontSize:18,color:'var(--ink-3)'}}>/8</span></div>
          <div className="cb-kpi__hint">87% · 还剩 1 项</div>
        </div>
        <div className="cb-kpi">
          <div className="cb-kpi__label">下次会议</div>
          <div className="cb-kpi__num" style={{fontSize: 28}}>05·09</div>
          <div className="cb-kpi__hint">周五 · 14:00 · 在线</div>
        </div>
      </div>

      {/* TIMELINE — the centerpiece */}
      <div className="cb-section-h">
        <h2><span className="accent">●</span> 我们为您做了什么</h2>
        <span className="cb-section-h__sub">/ 按时间倒序 · 每条都是已交付的工作</span>
        <div className="right">
          <span className="row gap-8" style={{display:'inline-flex', verticalAlign: 'middle'}}>
            {[
              {v:'all', l:'全部', n: customerTimeline.length},
              {v:'content', l:'内容', n: customerTimeline.filter(t=>t.kind==='content').length},
              {v:'consulting', l:'咨询', n: customerTimeline.filter(t=>t.kind==='consulting').length},
              {v:'connect', l:'对接', n: customerTimeline.filter(t=>t.kind==='connect').length},
              {v:'event', l:'活动', n: customerTimeline.filter(t=>t.kind==='event').length},
            ].map(o => (
              <span key={o.v} onClick={() => setFilter(o.v)}
                className={`chip ${filter === o.v ? 'chip--active' : ''}`}
                style={{cursor:'pointer'}}>
                {o.l} <span className="muted-2" style={{marginLeft: 2}}>{o.n}</span>
              </span>
            ))}
          </span>
        </div>
      </div>

      <div className="timeline">
        {filtered.map((item, i) => {
          const meta = kindMeta[item.kind];
          return (
            <div key={i} className={`tl-item ${meta.itemCls}`}>
              <div className="tl-card">
                <div className="tl-card__top">
                  <div className="row gap-8">
                    <span className={meta.cls}>{meta.tag}</span>
                    {item.link && <span className="muted mono" style={{fontSize: 11}}><Icon name="link" size={10} style={{verticalAlign: 'middle'}}/> {item.link}</span>}
                  </div>
                  <span className="tl-card__date">{item.date}</span>
                </div>

                <div className="tl-card__title">{item.title}</div>
                <div className="tl-card__detail">{item.detail}</div>

                {item.image && (
                  <div className="tl-card__images">
                    <div className="tl-img"><FakePreview kind={item.kind} idx={i*2}/></div>
                    {i % 2 === 0 && <div className="tl-img"><FakePreview kind={item.kind} idx={i*2+1}/></div>}
                  </div>
                )}

                {item.metric && (
                  <div className="tl-card__metrics">
                    {Object.entries(item.metric).map(([k, v]) => (
                      <div key={k} className="tl-metric">
                        <div className="v">{v}</div>
                        <div className="l">{k}</div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </div>
          );
        })}
      </div>

      {/* Two columns: needs + meetings */}
      <div className="grid" style={{gridTemplateColumns: '1fr 1fr', gap: 24, marginTop: 8}}>
        <div>
          <div className="cb-section-h" style={{marginTop: 36}}>
            <h2><span className="accent">●</span> 核心需求 · 解决进度</h2>
          </div>
          {[
            { title: '完成 Series A pitch deck V3', detail: '基于 V2 评审意见重做', pct: 75, status: '进行中' },
            { title: '建立北美 Webinar 节奏',      detail: '客户案例驱动的选题',     pct: 45, status: '进行中' },
            { title: '维持冷邮件 4%+ 回复率',      detail: '版本 B 主线 + 主题轮换', pct: 88, status: '已完成' },
            { title: '深化 ICP mid-market 路径',   detail: '基于 6 场访谈的二轮验证', pct: 30, status: '待启动' },
            { title: '内容主轴三支柱产能',         detail: '每月 8 篇 · 长文 + Thread', pct: 62, status: '进行中' },
          ].map((n, i) => {
            const color = n.status === '已完成' ? 'var(--success)' : n.status === '待启动' ? 'var(--ink-4)' : 'var(--cyan)';
            return (
              <div key={i} className="need-row">
                <div>
                  <div className="need-row__title">{n.title}</div>
                  <div className="muted" style={{fontSize: 11.5, marginBottom: 8}}>{n.detail}</div>
                  <div className="need-row__bar">
                    <div className="need-row__fill" style={{width: n.pct + '%', background: color, boxShadow: `0 0 6px ${color}`}}/>
                  </div>
                </div>
                <div style={{textAlign: 'right'}}>
                  <div className="mono" style={{fontSize: 18, fontWeight: 600, color}}>{n.pct}%</div>
                  <div className="mono" style={{fontSize: 10, color: 'var(--ink-3)', marginTop: 2}}>{n.status}</div>
                </div>
              </div>
            );
          })}
        </div>

        <div>
          <div className="cb-section-h" style={{marginTop: 36}}>
            <h2><span className="accent">●</span> 会议时间线</h2>
            <span className="cb-section-h__sub">/ 共 {meetings.length} 次</span>
          </div>
          {meetings.slice(0, 5).map(m => (
            <div key={m.no} className="mt-row" onClick={() => alert('打开会议详情(D2)\n\n会议:' + m.title)}>
              <div className="mt-row__date">
                <strong>{m.date.slice(8)}</strong>
                {m.date.slice(0, 7).replace('-', '·')}
              </div>
              <div>
                <div style={{fontSize: 13.5, color: 'var(--ink)', marginBottom: 4}}>{m.title}</div>
                <div className="muted" style={{fontSize: 12, lineHeight: 1.5}}>{m.external}</div>
              </div>
              <Icon name="chevron" size={14} style={{color: 'var(--ink-4)'}}/>
            </div>
          ))}
        </div>
      </div>

      {/* Next plan */}
      <div className="cb-section-h">
        <h2><span className="accent">●</span> 下一阶段重点</h2>
        <span className="cb-section-h__sub">/ 接下来 4 周(W7—W10)</span>
        <span className="right">质量提升 → 成果交付</span>
      </div>
      <div className="plan-grid">
        {[
          { week: 'W7 · 05/05—05/11', current: true, title: 'Pitch Deck V3 + Webinar 启动', bullets: ['完成 Pitch Deck V3 修订', '北美 Webinar 选题第一稿', '冷邮件版本 B 主题轮换上线'] },
          { week: 'W8 · 05/12—05/18', title: 'Webinar 试录 + 内容月度复盘',     bullets: ['Webinar 内部试录 2 场',  '5 月内容产出复盘', 'ICP 二轮验证启动'] },
          { week: 'W9 · 05/19—05/25', title: '正式 Webinar #1 + 渠道复盘',      bullets: ['首场对外 Webinar',      'LinkedIn 月度数据复盘', 'Series A FAQ 整理'] },
          { week: 'W10 · 05/26—06/01', title: '成果交付期启动',                  bullets: ['8 周成果总报告初稿',    'KPI 复盘 + 下一阶段方案', '续约谈判材料预备'] },
        ].map((p, i) => (
          <div key={i} className={`plan-cell ${p.current ? 'plan-cell--current' : ''}`}>
            <div className="plan-cell__week">{p.week}{p.current && ' · 本周'}</div>
            <div className="plan-cell__title">{p.title}</div>
            <ul className="plan-cell__bullets" style={{margin: 0, paddingLeft: 14}}>
              {p.bullets.map((b, j) => <li key={j}>{b}</li>)}
            </ul>
          </div>
        ))}
      </div>

      <div className="footer-line">
        本看板由 AIWATCH / KNOWLEDGE_OS 自动生成 · 仅 QVeris 团队可访问<br/>
        如有疑问请直接联系您的对接团队 · <a href="mailto:liyihang@aiwatch.io">liyihang@aiwatch.io</a><br/>
        <span style={{fontSize: 10, opacity: 0.6}}>访问令牌 cb_qveris_x9k2m4p7 · 本链接由我方私密发送 · 请勿外传</span>
      </div>
    </div>
  );
}

function FakePreview({ kind, idx }) {
  const palettes = {
    content:    [['#0a1622', '#0e2238', '#00E5FF'], ['#101620', '#162232', '#6BA6FF']],
    consulting: [['#1a1530', '#2a1f50', '#B388FF']],
    event:      [['#251a08', '#3a2810', '#FF9500']],
    connect:    [['#082218', '#0d3325', '#00D9A3']],
  };
  const p = (palettes[kind] || palettes.content)[idx % (palettes[kind]?.length || 1)];
  const id = `cbg${idx}`;

  // Render different shapes based on kind to feel less repetitive
  if (kind === 'content') {
    return (
      <svg viewBox="0 0 160 120" width="100%" height="100%" style={{position:'absolute',inset:0}}>
        <defs><linearGradient id={id} x1="0" x2="1" y1="0" y2="1"><stop offset="0" stopColor={p[0]}/><stop offset="1" stopColor={p[1]}/></linearGradient></defs>
        <rect width="160" height="120" fill={`url(#${id})`}/>
        {/* mock LinkedIn post */}
        <circle cx="20" cy="20" r="8" fill={p[2]} opacity="0.6"/>
        <rect x="32" y="14" width="50" height="3" rx="1" fill={p[2]} opacity="0.5"/>
        <rect x="32" y="20" width="36" height="2" rx="1" fill={p[2]} opacity="0.3"/>
        <rect x="12" y="38" width="136" height="2" rx="1" fill={p[2]} opacity="0.5"/>
        <rect x="12" y="44" width="120" height="2" rx="1" fill={p[2]} opacity="0.4"/>
        <rect x="12" y="50" width="130" height="2" rx="1" fill={p[2]} opacity="0.4"/>
        <rect x="12" y="56" width="80" height="2" rx="1" fill={p[2]} opacity="0.3"/>
        <rect x="12" y="74" width="136" height="32" rx="3" fill={p[2]} opacity="0.12"/>
        <text x="80" y="94" textAnchor="middle" fontFamily="JetBrains Mono" fontSize="10" fill={p[2]} opacity="0.7">📊 阅读 1.2k</text>
      </svg>
    );
  }
  if (kind === 'consulting') {
    return (
      <svg viewBox="0 0 160 120" width="100%" height="100%" style={{position:'absolute',inset:0}}>
        <defs><linearGradient id={id} x1="0" x2="1" y1="0" y2="1"><stop offset="0" stopColor={p[0]}/><stop offset="1" stopColor={p[1]}/></linearGradient></defs>
        <rect width="160" height="120" fill={`url(#${id})`}/>
        <rect x="14" y="14" width="132" height="6" rx="1" fill={p[2]} opacity="0.5"/>
        {[0,1,2,3,4].map(i => <rect key={i} x="14" y={28 + i*14} width={130 - i*16} height="3" rx="1" fill={p[2]} opacity={0.5 - i*0.06}/>)}
        <rect x="100" y="92" width="46" height="14" rx="2" fill={p[2]} opacity="0.25"/>
        <text x="123" y="102" textAnchor="middle" fontFamily="JetBrains Mono" fontSize="9" fill={p[2]}>V3 草稿</text>
      </svg>
    );
  }
  if (kind === 'event') {
    return (
      <svg viewBox="0 0 160 120" width="100%" height="100%" style={{position:'absolute',inset:0}}>
        <defs><linearGradient id={id} x1="0" x2="1" y1="0" y2="1"><stop offset="0" stopColor={p[0]}/><stop offset="1" stopColor={p[1]}/></linearGradient></defs>
        <rect width="160" height="120" fill={`url(#${id})`}/>
        <rect x="14" y="14" width="132" height="76" rx="4" fill={p[2]} opacity="0.1"/>
        <polygon points="74,42 74,76 96,59" fill={p[2]} opacity="0.7"/>
        <rect x="14" y="98" width="40" height="3" rx="1" fill={p[2]} opacity="0.5"/>
        <rect x="60" y="98" width="60" height="3" rx="1" fill={p[2]} opacity="0.3"/>
      </svg>
    );
  }
  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

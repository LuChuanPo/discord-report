    <rect x="566" y="178" width="260" height="52" rx="12" fill="#FFFFFF" stroke="#D9DEE8"/>
    <text x="584" y="209" fill="#111827" font-size="15" font-weight="700">What Is a Data Agent?</text>

    <!-- Layer 2: Architect -->
    <rect x="100" y="242" width="158" height="52" rx="12" fill="#F5F3FF" stroke="#DDD6FE"/>
    <text x="118" y="267" fill="#6D28D9" font-size="14" font-weight="800">2 · ARCHITECT</text>
    <text x="118" y="285" fill="#6B7280" font-size="12">stack · context layer</text>
    <rect x="286" y="242" width="260" height="52" rx="12" fill="#FFFFFF" stroke="#D9DEE8"/>
    <text x="304" y="273" fill="#111827" font-size="15" font-weight="700">AI-Native Data Platform</text>
    <rect x="566" y="242" width="260" height="52" rx="12" fill="#FFFFFF" stroke="#D9DEE8"/>
    <text x="584" y="273" fill="#111827" font-size="15" font-weight="700">AI Agent Memory for Data</text>

    <!-- Layer 3: Operate -->
    <rect x="100" y="306" width="158" height="52" rx="12" fill="#ECFDF5" stroke="#BBF7D0"/>
    <text x="118" y="331" fill="#047857" font-size="14" font-weight="800">3 · OPERATE</text>
    <text x="118" y="349" fill="#6B7280" font-size="12">workflow · autonomy</text>
    <rect x="286" y="306" width="260" height="52" rx="12" fill="#FFFFFF" stroke="#D9DEE8"/>
    <text x="304" y="337" fill="#111827" font-size="15" font-weight="700">Agentic Analytics Explained</text>
    <rect x="566" y="306" width="260" height="52" rx="12" fill="#FFFFFF" stroke="#D9DEE8"/>
    <text x="584" y="337" fill="#111827" font-size="15" font-weight="700">Autonomous Data Agent</text>
    <rect x="846" y="306" width="254" height="52" rx="12" fill="#FFFFFF" stroke="#D9DEE8"/>
    <text x="864" y="337" fill="#111827" font-size="15" font-weight="700">AI Data Analyst Explained</text>

    <!-- Layer 4: Compare -->
    <rect x="100" y="370" width="158" height="52" rx="12" fill="#FEF3C7" stroke="#FDE68A"/>
    <text x="118" y="395" fill="#B45309" font-size="14" font-weight="800">4 · COMPARE</text>
    <text x="118" y="413" fill="#6B7280" font-size="12">vs what you have</text>
    <rect x="286" y="370" width="260" height="52" rx="12" fill="#FFFFFF" stroke="#D9DEE8"/>
    <text x="304" y="401" fill="#111827" font-size="15" font-weight="700">Data Agent vs AI Copilot</text>
    <rect x="566" y="370" width="300" height="52" rx="12" fill="#FFFFFF" stroke="#D9DEE8"/>
    <text x="584" y="401" fill="#111827" font-size="15" font-weight="700">AI-Native vs Augmented Analytics</text>


    <text x="118" y="459" fill="#BE185D" font-size="14" font-weight="800">5 · TRUST</text>
    <text x="118" y="477" fill="#6B7280" font-size="12">audit · governance</text>
    <rect x="286" y="434" width="300" height="52" rx="12" fill="#FFFFFF" stroke="#D9DEE8"/>
    <text x="304" y="465" fill="#111827" font-size="15" font-weight="700">Explainable AI Data Analysis</text>

    <!-- Layer 6: Reference -->
    <rect x="100" y="498" width="158" height="52" rx="12" fill="#EFF6FF" stroke="#BFDBFE"/>
    <text x="118" y="523" fill="#1D4ED8" font-size="14" font-weight="800">6 · REFERENCE</text>
    <text x="118" y="541" fill="#6B7280" font-size="12">vocabulary · hiring</text>
    <rect x="286" y="498" width="260" height="52" rx="12" fill="#FFFFFF" stroke="#D9DEE8"/>
    <text x="304" y="529" fill="#111827" font-size="15" font-weight="700">Data Agent Glossary 2026</text>
    <rect x="566" y="498" width="300" height="52" rx="12" fill="#FFFFFF" stroke="#D9DEE8"/>
    <text x="584" y="529" fill="#111827" font-size="15" font-weight="700">AI Data Analyst Job Description</text>

    <!-- Flow arrow down the left side of layer pills -->
    <path d="M179 230v6M179 294v6M179 358v6M179 422v6M179 486v6" stroke="#5B5BFF" stroke-width="4" stroke-linecap="round"/>

    <!-- Right-side funnel annotation -->
    <rect x="900" y="178" width="200" height="116" rx="12" fill="#F8FAFC" stroke="#E5E7EB"/>
    <text x="918" y="206" fill="#6B7280" font-size="13" font-weight="800">FUNNEL</text>
    <text x="918" y="230" fill="#4B5563" font-size="13">Layers 1-2 · learn (TOFU)</text>
    <text x="918" y="252" fill="#4B5563" font-size="13">Layers 3-4 · evaluate (MOFU)</text>
    <text x="918" y="274" fill="#4B5563" font-size="13">Layers 5-6 · decide and align</text>

    <rect x="900" y="370" width="200" height="180" rx="12" fill="#F8FAFC" stroke="#E5E7EB"/>
    <text x="918" y="398" fill="#6B7280" font-size="13" font-weight="800">READING PATHS</text>
    <text x="918" y="422" fill="#4B5563" font-size="13">Evaluator: 1 → 4 → 5</text>
    <text x="918" y="444" fill="#4B5563" font-size="13">Architect: 2 → 3 → 5</text>
    <text x="918" y="466" fill="#4B5563" font-size="13">Practitioner: 3 → 6</text>
    <text x="918" y="496" fill="#9CA3AF" font-size="12">Each path is a four-page</text>
    <text x="918" y="514" fill="#9CA3AF" font-size="12">sequence on the hub.</text>
  </g>

  <text x="100" y="572" fill="#6B7280" font-family="Inter, Arial, sans-serif" font-size="15">InfiniSynapse — enterprise AI data analyst · infinisynapse.com/Category</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Data agent topic cluster map: six layers from definition to reference</title>
  <desc id="desc">Cluster map of twelve data agent guides arranged in six layers: define, architect, operate, compare, trust, and reference, flowing from category education to tool evaluation.</desc>
  <rect width="1200" height="630" fill="#F8FAFC"/>
  <rect x="50" y="46" width="1100" height="538" rx="28" fill="#FFFFFF" stroke="#D9DEE8" stroke-width="2"/>

  <text x="100" y="110" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="800">How the data agent cluster fits together</text>
  <text x="100" y="148" fill="#5B5BFF" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">Six layers, twelve guides — from first definition to shared vocabulary</text>

  <g font-family="Inter, Arial, sans-serif">
    <!-- Layer 1: Define -->
    <rect x="100" y="178" width="158" height="52" rx="12" fill="#EEF2FF" stroke="#C7D2FE"/>
    <text x="118" y="203" fill="#4338CA" font-size="14" font-weight="800">1 · DEFINE</text>
    <text x="118" y="221" fill="#6B7280" font-size="12">why now · what it is</text>
    <rect x="286" y="178" width="260" height="52" rx="12" fill="#FFFFFF" stroke="#D9DEE8"/>

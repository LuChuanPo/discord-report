<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Data agent glossary terminology map</title>
  <desc id="desc">Terminology map of the data agent glossary showing five clustered groups around a central node: core concepts, architecture, workflow, evaluation and governance, and adjacent categories.</desc>
  <rect width="1200" height="630" fill="#F8FAFC"/>
  <rect x="50" y="46" width="1100" height="538" rx="28" fill="#FFFFFF" stroke="#D9DEE8" stroke-width="2"/>

  <text x="100" y="112" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="40" font-weight="800">Data agent glossary: the terminology map</text>
  <text x="100" y="150" fill="#5B5BFF" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700">Five term groups around one category</text>

  <!-- Connector lines from center node to groups -->
  <g stroke="#C7CEDA" stroke-width="3">
    <line x1="520" y1="276" x2="380" y2="240"/>
    <line x1="680" y1="276" x2="820" y2="240"/>
    <line x1="520" y1="316" x2="380" y2="430"/>
    <line x1="680" y1="316" x2="820" y2="430"/>
    <line x1="600" y1="328" x2="600" y2="420"/>
  </g>

  <g font-family="Inter, Arial, sans-serif">
    <!-- Center node -->
    <rect x="480" y="260" width="240" height="68" rx="16" fill="#5B5BFF"/>
    <text x="600" y="289" fill="#FFFFFF" font-size="19" font-weight="800" text-anchor="middle">Data agent</text>
    <text x="600" y="312" fill="#E0E7FF" font-size="15" font-weight="600" text-anchor="middle">terminology, 2026</text>

    <!-- Group 1: Core concepts (top-left, indigo) -->
    <rect x="90" y="180" width="300" height="112" rx="16" fill="#EEF2FF" stroke="#C7D2FE"/>
    <text x="112" y="212" fill="#4338CA" font-size="19" font-weight="800">Core concepts</text>
    <text x="112" y="240" fill="#6B7280" font-size="15">data agent · agentic analytics</text>
    <text x="112" y="263" fill="#6B7280" font-size="15">AI data analyst · autonomous agent</text>

    <!-- Group 2: Architecture (top-right, violet) -->
    <rect x="810" y="180" width="300" height="112" rx="16" fill="#F5F3FF" stroke="#DDD6FE"/>
    <text x="832" y="212" fill="#6D28D9" font-size="19" font-weight="800">Architecture</text>
    <text x="832" y="240" fill="#6B7280" font-size="15">LLM-Native RAG · schema retrieval</text>
    <text x="832" y="263" fill="#6B7280" font-size="15">knowledge base · InfiniSQL</text>

    <!-- Group 3: Workflow (bottom-left, green) -->
    <rect x="90" y="400" width="300" height="112" rx="16" fill="#ECFDF5" stroke="#BBF7D0"/>
    <text x="112" y="432" fill="#047857" font-size="19" font-weight="800">Workflow</text>
    <text x="112" y="460" fill="#6B7280" font-size="15">plan mode · plan-execute-verify</text>
    <text x="112" y="483" fill="#6B7280" font-size="15">self-correction · evidence trail</text>

    <!-- Group 4: Evaluation & governance (bottom-right, amber) -->
    <rect x="810" y="400" width="300" height="112" rx="16" fill="#FEF3C7" stroke="#FDE68A"/>
    <text x="832" y="432" fill="#B45309" font-size="19" font-weight="800">Evaluation &amp; governance</text>
    <text x="832" y="460" fill="#6B7280" font-size="15">BIRD · hallucination · audit trail</text>
    <text x="832" y="483" fill="#6B7280" font-size="15">NIST AI RMF · read-only credentials</text>

    <!-- Group 5: Adjacent categories (bottom-center, pink) -->
    <rect x="450" y="420" width="300" height="100" rx="16" fill="#FDF2F8" stroke="#FBCFE8"/>
    <text x="472" y="450" fill="#BE185D" font-size="19" font-weight="800">Adjacent categories</text>
    <text x="472" y="476" fill="#6B7280" font-size="15">NLP2SQL · ChatBI · copilot</text>
    <text x="472" y="499" fill="#6B7280" font-size="15">augmented analytics · BI dashboard</text>
  </g>

  <text x="100" y="560" fill="#6B7280" font-family="Inter, Arial, sans-serif" font-size="18">InfiniSynapse — enterprise AI data analyst</text>
</svg>

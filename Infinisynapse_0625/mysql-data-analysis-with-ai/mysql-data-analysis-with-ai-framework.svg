<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="titleB descB">
  <title id="titleB">Five stages of MySQL data analysis with AI</title>
  <descB id="descB">A five-stage flow for MySQL data analysis with AI: context retrieval from a bound knowledge base, plan review by the user, execution against MySQL with JOIN annotation, verification of row counts and nulls, and a delivered answer with evidence trail.</descB>
  <rect width="1200" height="630" fill="#F8FAFC"/>
  <rect x="50" y="46" width="1100" height="538" rx="28" fill="#FFFFFF" stroke="#D9DEE8" stroke-width="2"/>
  <text x="100" y="110" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="800">MySQL data analysis with AI — five stages</text>
  <text x="100" y="148" fill="#5B5BFF" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">From plain English to a verified MySQL result, plan-reviewed</text>

  <g font-family="Inter, Arial, sans-serif">
    <!-- Stage 1: Context -->
    <rect x="80" y="200" width="200" height="200" rx="16" fill="#F5F3FF" stroke="#DDD6FE"/>
    <text x="100" y="232" fill="#6D28D9" font-size="13" font-weight="800">STAGE 1</text>
    <text x="100" y="258" fill="#0A0A0A" font-size="18" font-weight="800">Context</text>
    <text x="100" y="282" fill="#6B7280" font-size="13">Bound KB retrieval</text>
    <rect x="100" y="298" width="160" height="22" rx="5" fill="#FFFFFF" stroke="#DDD6FE"/>
    <text x="110" y="314" fill="#111827" font-size="11" font-weight="700">metric: repeat_purchase</text>
    <rect x="100" y="326" width="160" height="22" rx="5" fill="#FFFFFF" stroke="#DDD6FE"/>
    <text x="110" y="342" fill="#111827" font-size="11" font-weight="700">dict: orders.status</text>
    <rect x="100" y="354" width="160" height="22" rx="5" fill="#FFFFFF" stroke="#DDD6FE"/>
    <text x="110" y="370" fill="#111827" font-size="11" font-weight="700">playbook: repeat-drop</text>

    <!-- Stage 2: Plan review -->
    <rect x="300" y="200" width="200" height="200" rx="16" fill="#ECFDF5" stroke="#BBF7D0"/>
    <text x="320" y="232" fill="#047857" font-size="13" font-weight="800">STAGE 2</text>
    <text x="320" y="258" fill="#0A0A0A" font-size="18" font-weight="800">Plan review</text>
    <text x="320" y="282" fill="#6B7280" font-size="13">User approves before SQL</text>
    <rect x="320" y="298" width="160" height="22" rx="5" fill="#FFFFFF" stroke="#BBF7D0"/>
    <text x="330" y="314" fill="#111827" font-size="11" font-weight="700">join orders + customers</text>
    <rect x="320" y="326" width="160" height="22" rx="5" fill="#FFFFFF" stroke="#BBF7D0"/>
    <text x="330" y="342" fill="#111827" font-size="11" font-weight="700">window: last 2 quarters</text>
    <rect x="320" y="354" width="160" height="22" rx="5" fill="#FFFFFF" stroke="#047857"/>
    <text x="330" y="370" fill="#047857" font-size="11" font-weight="800">✓ approved</text>

    <!-- Stage 3: Execute MySQL -->
    <rect x="520" y="200" width="200" height="200" rx="16" fill="#FEF3C7" stroke="#FDE68A"/>
    <text x="540" y="232" fill="#B45309" font-size="13" font-weight="800">STAGE 3</text>
    <text x="540" y="258" fill="#0A0A0A" font-size="18" font-weight="800">Execute on MySQL</text>
    <text x="540" y="282" fill="#6B7280" font-size="13">Read-only credentials</text>
    <rect x="540" y="298" width="160" height="22" rx="5" fill="#FFFFFF" stroke="#FDE68A"/>
    <text x="550" y="314" fill="#111827" font-size="11" font-weight="700">SELECT ... FROM orders</text>
    <rect x="540" y="326" width="160" height="22" rx="5" fill="#FFFFFF" stroke="#FDE68A"/>
    <text x="550" y="342" fill="#B45309" font-size="11" font-weight="800">JOIN customers c</text>
    <rect x="540" y="354" width="160" height="22" rx="5" fill="#FFFFFF" stroke="#FDE68A"/>
    <text x="550" y="370" fill="#111827" font-size="11" font-weight="700">GROUP BY region</text>

    <!-- Stage 4: Verify -->
    <rect x="740" y="200" width="200" height="200" rx="16" fill="#FDF2F8" stroke="#FBCFE8"/>
    <text x="760" y="232" fill="#BE185D" font-size="13" font-weight="800">STAGE 4</text>
    <text x="760" y="258" fill="#0A0A0A" font-size="18" font-weight="800">Verify</text>
    <text x="760" y="282" fill="#6B7280" font-size="13">Self-check before deliver</text>
    <rect x="760" y="298" width="160" height="22" rx="5" fill="#FFFFFF" stroke="#FBCFE8"/>
    <text x="770" y="314" fill="#111827" font-size="11" font-weight="700">rows: 14,238</text>
    <rect x="760" y="326" width="160" height="22" rx="5" fill="#FFFFFF" stroke="#FBCFE8"/>
    <text x="770" y="342" fill="#111827" font-size="11" font-weight="700">null rate: 0.4%</text>
    <rect x="760" y="354" width="160" height="22" rx="5" fill="#FFFFFF" stroke="#FBCFE8"/>
    <text x="770" y="370" fill="#111827" font-size="11" font-weight="700">2nd-path match: ✓</text>

    <!-- Stage 5: Deliver -->
    <rect x="960" y="200" width="160" height="200" rx="16" fill="#EEF2FF" stroke="#C7D2FE"/>
    <text x="980" y="232" fill="#4338CA" font-size="13" font-weight="800">STAGE 5</text>
    <text x="980" y="258" fill="#0A0A0A" font-size="18" font-weight="800">Deliver</text>
    <text x="980" y="282" fill="#6B7280" font-size="13">+ evidence</text>
    <rect x="980" y="298" width="124" height="22" rx="5" fill="#FFFFFF" stroke="#C7D2FE"/>
    <text x="990" y="314" fill="#111827" font-size="11" font-weight="700">answer + chart</text>
    <rect x="980" y="326" width="124" height="22" rx="5" fill="#FFFFFF" stroke="#C7D2FE"/>
    <text x="990" y="342" fill="#111827" font-size="11" font-weight="700">plan + SQL</text>
    <rect x="980" y="354" width="124" height="22" rx="5" fill="#FFFFFF" stroke="#C7D2FE"/>
    <text x="990" y="370" fill="#111827" font-size="11" font-weight="700">KB citations</text>

    <!-- Arrows -->
    <path d="M280 298h20" stroke="#5B5BFF" stroke-width="4" stroke-linecap="round"/>
    <path d="M292 290l10 8-10 8" stroke="#5B5BFF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M500 298h20" stroke="#5B5BFF" stroke-width="4" stroke-linecap="round"/>
    <path d="M512 290l10 8-10 8" stroke="#5B5BFF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M720 298h20" stroke="#5B5BFF" stroke-width="4" stroke-linecap="round"/>
    <path d="M732 290l10 8-10 8" stroke="#5B5BFF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M940 298h20" stroke="#5B5BFF" stroke-width="4" stroke-linecap="round"/>
    <path d="M952 290l10 8-10 8" stroke="#5B5BFF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

    <!-- Plain English in -->
    <rect x="80" y="450" width="420" height="74" rx="14" fill="#FFFFFF" stroke="#D9DEE8" stroke-dasharray="6 5"/>
    <text x="100" y="478" fill="#6B7280" font-size="13" font-weight="800">PLAIN ENGLISH IN</text>
    <text x="100" y="502" fill="#111827" font-size="15" font-weight="700">"Why did East China repeat purchases drop 18%?"</text>

    <!-- Re-plan loop -->
    <path d="M840 410v18c0 10-8 18-18 18H440c-10 0-18-8-18-18v-12" stroke="#F59E0B" stroke-width="4" stroke-dasharray="9 7" fill="none" stroke-linecap="round"/>
    <text x="600" y="450" fill="#B45309" font-size="12" font-weight="700">re-plan if verify fails</text>
  </g>

  <text x="100" y="565" fill="#6B7280" font-family="Inter, Arial, sans-serif" font-size="14">InfiniSynapse — MySQL + bound knowledge base · plan-mode review · cross-source joins</text>
</svg>

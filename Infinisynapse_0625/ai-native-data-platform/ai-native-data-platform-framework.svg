<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">The five layers of an AI-native data platform</title>
  <desc id="desc">Architecture stack diagram: context layer, planning layer, execution layer, and tool and artifact layer flow top to bottom, with a governance layer spanning all four — permissions, evidence trails, and private deployment.</desc>
  <rect width="1200" height="630" fill="#F8FAFC"/>
  <rect x="50" y="46" width="1100" height="538" rx="28" fill="#FFFFFF" stroke="#D9DEE8" stroke-width="2"/>

  <text x="100" y="112" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="800">The five layers of an AI-native data platform</text>
  <text x="100" y="150" fill="#5B5BFF" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">Designed around the agent loop — not a chat box on a dashboard</text>

  <g font-family="Inter, Arial, sans-serif">
    <!-- Layer 1: Context -->
    <rect x="100" y="184" width="700" height="76" rx="14" fill="#EEF2FF" stroke="#C7D2FE"/>
    <text x="122" y="216" fill="#4338CA" font-size="14" font-weight="800">LAYER 1 · CONTEXT</text>
    <text x="122" y="244" fill="#111827" font-size="19" font-weight="800">RAG over knowledge base + schema <tspan fill="#6B7280" font-size="15" font-weight="500">definitions · dictionaries · playbooks · join keys</tspan></text>

    <!-- Layer 2: Planning -->
    <rect x="100" y="272" width="700" height="76" rx="14" fill="#F5F3FF" stroke="#DDD6FE"/>
    <text x="122" y="304" fill="#6D28D9" font-size="14" font-weight="800">LAYER 2 · PLANNING</text>
    <text x="122" y="332" fill="#111827" font-size="19" font-weight="800">Plan → execute → verify <tspan fill="#6B7280" font-size="15" font-weight="500">agent drafts the plan · you review · then it runs</tspan></text>

    <!-- Layer 3: Execution -->
    <rect x="100" y="360" width="700" height="76" rx="14" fill="#ECFDF5" stroke="#BBF7D0"/>
    <text x="122" y="392" fill="#047857" font-size="14" font-weight="800">LAYER 3 · EXECUTION</text>
    <text x="122" y="420" fill="#111827" font-size="19" font-weight="800">Intermediate representation, multi-source <tspan fill="#6B7280" font-size="15" font-weight="500">warehouses · databases · CSV/Excel</tspan></text>

    <!-- Layer 4: Tools & artifacts -->
    <rect x="100" y="448" width="700" height="76" rx="14" fill="#FEF3C7" stroke="#FDE68A"/>
    <text x="122" y="480" fill="#B45309" font-size="14" font-weight="800">LAYER 4 · TOOLS &amp; ARTIFACTS</text>
    <text x="122" y="508" fill="#111827" font-size="19" font-weight="800">Charts · spreadsheets · documents <tspan fill="#6B7280" font-size="15" font-weight="500">+ browser automation</tspan></text>

    <!-- Down arrows between layers -->
    <path d="M450 260v4" stroke="#5B5BFF" stroke-width="5" stroke-linecap="round"/>
    <path d="M442 262l8 8 8-8" stroke="#5B5BFF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M450 348v4" stroke="#5B5BFF" stroke-width="5" stroke-linecap="round"/>
    <path d="M442 350l8 8 8-8" stroke="#5B5BFF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M450 436v4" stroke="#5B5BFF" stroke-width="5" stroke-linecap="round"/>
    <path d="M442 438l8 8 8-8" stroke="#5B5BFF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

    <!-- Layer 5: Governance rail spanning all four -->
    <rect x="836" y="184" width="264" height="340" rx="14" fill="#FDF2F8" stroke="#FBCFE8"/>
    <text x="858" y="220" fill="#BE185D" font-size="14" font-weight="800">LAYER 5 · GOVERNANCE</text>
    <text x="858" y="254" fill="#111827" font-size="19" font-weight="800">Spans every layer</text>
    <text x="858" y="292" fill="#6B7280" font-size="15">· scoped, read-only</text>
    <text x="858" y="316" fill="#6B7280" font-size="15">  permissions</text>
    <text x="858" y="348" fill="#6B7280" font-size="15">· evidence trail on</text>
    <text x="858" y="372" fill="#6B7280" font-size="15">  every result</text>
    <text x="858" y="404" fill="#6B7280" font-size="15">· private cloud,</text>
    <text x="858" y="428" fill="#6B7280" font-size="15">  on-premises,</text>
    <text x="858" y="452" fill="#6B7280" font-size="15">  air-gapped</text>
    <text x="858" y="484" fill="#6B7280" font-size="15">· NIST AI RMF /</text>
    <text x="858" y="508" fill="#6B7280" font-size="15">  ISO/IEC 42001</text>

    <!-- Bracket connecting governance to stack -->
    <path d="M812 222h12M812 222v264M812 486h12M804 354h8" stroke="#BE185D" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.55"/>
  </g>

  <text x="100" y="560" fill="#6B7280" font-family="Inter, Arial, sans-serif" font-size="17">InfiniSynapse — enterprise AI data analyst</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Data agent vs AI copilot: assistance model vs delegation model</title>
  <desc id="desc">Two-column comparison: the copilot assistance model on the left, where the user owns each step inside one app — you ask, it suggests, you execute, you verify; the data agent delegation model on the right, where the agent runs a plan, execute, verify, explain loop under user review. Honest win markers below: copilots win setup cost, learning curve, and in-app convenience; agents win data reach, verification, evidence trail, and context model; three dimensions depend on scope.</desc>
  <rect width="1200" height="630" fill="#F8FAFC"/>
  <rect x="50" y="46" width="1100" height="538" rx="28" fill="#FFFFFF" stroke="#D9DEE8" stroke-width="2"/>

  <text x="100" y="116" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="40" font-weight="800">Data agent vs AI copilot</text>
  <text x="100" y="156" fill="#5B5BFF" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700">Assistance vs delegation — and who honestly wins each dimension</text>

  <g font-family="Inter, Arial, sans-serif">
    <!-- Left panel: copilot -->
    <rect x="100" y="196" width="470" height="196" rx="16" fill="#F5F3FF" stroke="#DDD6FE"/>
    <text x="124" y="228" fill="#6D28D9" font-size="16" font-weight="800">AI COPILOT — ASSISTANCE</text>
    <text x="124" y="252" fill="#6B7280" font-size="14">you own each step, inside one app</text>

    <rect x="124" y="276" width="92" height="44" rx="9" fill="#FFFFFF" stroke="#DDD6FE"/>
    <text x="170" y="302" fill="#111827" font-size="12.5" font-weight="600" text-anchor="middle">you ask</text>
    <rect x="234" y="276" width="92" height="44" rx="9" fill="#FFFFFF" stroke="#DDD6FE"/>
    <text x="280" y="302" fill="#111827" font-size="12.5" font-weight="600" text-anchor="middle">it suggests</text>
    <rect x="344" y="276" width="92" height="44" rx="9" fill="#FFFFFF" stroke="#DDD6FE"/>
    <text x="390" y="302" fill="#111827" font-size="12.5" font-weight="600" text-anchor="middle">you execute</text>
    <rect x="454" y="276" width="92" height="44" rx="9" fill="#FFFFFF" stroke="#DDD6FE"/>
    <text x="500" y="302" fill="#111827" font-size="12.5" font-weight="600" text-anchor="middle">you verify</text>
    <path d="M220 290l10 8-10 8" stroke="#5B5BFF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M330 290l10 8-10 8" stroke="#5B5BFF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M440 290l10 8-10 8" stroke="#5B5BFF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

    <rect x="124" y="336" width="422" height="40" rx="9" fill="#FFFFFF" stroke="#DDD6FE"/>
    <text x="335" y="361" fill="#6B7280" font-size="14" text-anchor="middle">Scope: the host app's data · you check everything</text>

    <!-- vs badge -->
    <circle cx="600" cy="294" r="24" fill="#5B5BFF"/>
    <text x="600" y="301" fill="#FFFFFF" font-size="18" font-weight="800" text-anchor="middle">vs</text>

    <!-- Right panel: data agent -->
    <rect x="630" y="196" width="470" height="196" rx="16" fill="#EEF2FF" stroke="#C7D2FE"/>
    <text x="654" y="228" fill="#4338CA" font-size="16" font-weight="800">DATA AGENT — DELEGATION</text>
    <text x="654" y="252" fill="#6B7280" font-size="14">the agent runs the loop, you review</text>

    <rect x="654" y="276" width="92" height="44" rx="9" fill="#FFFFFF" stroke="#C7D2FE"/>
    <text x="700" y="302" fill="#111827" font-size="12.5" font-weight="600" text-anchor="middle">plan</text>
    <rect x="764" y="276" width="92" height="44" rx="9" fill="#FFFFFF" stroke="#C7D2FE"/>
    <text x="810" y="302" fill="#111827" font-size="12.5" font-weight="600" text-anchor="middle">execute</text>
    <rect x="874" y="276" width="92" height="44" rx="9" fill="#FFFFFF" stroke="#C7D2FE"/>
    <text x="920" y="302" fill="#111827" font-size="12.5" font-weight="600" text-anchor="middle">verify</text>
    <rect x="984" y="276" width="92" height="44" rx="9" fill="#FFFFFF" stroke="#C7D2FE"/>
    <text x="1030" y="302" fill="#111827" font-size="12.5" font-weight="600" text-anchor="middle">explain</text>
    <path d="M750 290l10 8-10 8" stroke="#5B5BFF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M860 290l10 8-10 8" stroke="#5B5BFF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M970 290l10 8-10 8" stroke="#5B5BFF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

    <rect x="654" y="336" width="422" height="40" rx="9" fill="#FEF3C7" stroke="#FDE68A"/>
    <text x="865" y="361" fill="#B45309" font-size="14" font-weight="700" text-anchor="middle">You: review the plan · audit the evidence trail</text>

    <!-- Honest win markers -->
    <rect x="100" y="420" width="320" height="104" rx="14" fill="#F5F3FF" stroke="#DDD6FE"/>
    <text x="124" y="452" fill="#6D28D9" font-size="15" font-weight="800">COPILOT WINS · 3 OF 10</text>
    <text x="124" y="480" fill="#6B7280" font-size="13.5">setup cost · learning curve</text>
    <text x="124" y="502" fill="#6B7280" font-size="13.5">in-app convenience</text>

    <rect x="440" y="420" width="320" height="104" rx="14" fill="#EEF2FF" stroke="#C7D2FE"/>
    <text x="464" y="452" fill="#4338CA" font-size="15" font-weight="800">DATA AGENT WINS · 4 OF 10</text>
    <text x="464" y="480" fill="#6B7280" font-size="13.5">data reach · verification</text>
    <text x="464" y="502" fill="#6B7280" font-size="13.5">evidence trail · context model</text>

    <rect x="780" y="420" width="320" height="104" rx="14" fill="#FEF3C7" stroke="#FDE68A"/>
    <text x="804" y="452" fill="#B45309" font-size="15" font-weight="800">HONESTLY DEPENDS · 3 OF 10</text>
    <text x="804" y="480" fill="#6B7280" font-size="13.5">workflow ownership · economics</text>
    <text x="804" y="502" fill="#6B7280" font-size="13.5">best-fit question shape</text>
  </g>

  <text x="100" y="560" fill="#6B7280" font-family="Inter, Arial, sans-serif" font-size="18">InfiniSynapse — enterprise AI data analyst</text>
</svg>

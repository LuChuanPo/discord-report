<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">SQL for data analysis: four pattern families plus an AI agent loop</title>
  <desc id="desc">Four query pattern families — aggregation, joins, CTEs, and window functions — feed an AI agent that retrieves business context, plans the analysis, runs SQL, and verifies the result.</desc>
  <rect width="1200" height="630" fill="#F8FAFC"/>
  <rect x="50" y="46" width="1100" height="538" rx="28" fill="#FFFFFF" stroke="#D9DEE8" stroke-width="2"/>
  <text x="100" y="110" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="800">SQL for data analysis: four patterns + an AI agent loop</text>
  <text x="100" y="148" fill="#5B5BFF" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="700">The query shapes analysts use daily, paired with the agent workflow around them</text>

  <g font-family="Inter, Arial, sans-serif">
    <!-- Pattern 1 -->
    <rect x="90" y="190" width="240" height="150" rx="16" fill="#EEF2FF" stroke="#C7D2FE"/>
    <text x="108" y="220" fill="#4338CA" font-size="13" font-weight="800">PATTERN 1</text>
    <text x="108" y="248" fill="#111827" font-size="20" font-weight="800">Aggregation</text>
    <text x="108" y="274" fill="#6B7280" font-size="13">GROUP BY · HAVING</text>
    <text x="108" y="296" fill="#374151" font-family="Consolas, monospace" font-size="13">SUM, COUNT, AVG by key</text>
    <text x="108" y="320" fill="#6B7280" font-size="12">revenue by region, AOV by month</text>

    <!-- Pattern 2 -->
    <rect x="350" y="190" width="240" height="150" rx="16" fill="#F5F3FF" stroke="#DDD6FE"/>
    <text x="368" y="220" fill="#6D28D9" font-size="13" font-weight="800">PATTERN 2</text>
    <text x="368" y="248" fill="#111827" font-size="20" font-weight="800">Joins</text>
    <text x="368" y="274" fill="#6B7280" font-size="13">INNER · LEFT · semi</text>
    <text x="368" y="296" fill="#374151" font-family="Consolas, monospace" font-size="13">fact ⋈ dimension</text>
    <text x="368" y="320" fill="#6B7280" font-size="12">customers, orders, products</text>

    <!-- Pattern 3 -->
    <rect x="610" y="190" width="240" height="150" rx="16" fill="#ECFDF5" stroke="#BBF7D0"/>
    <text x="628" y="220" fill="#047857" font-size="13" font-weight="800">PATTERN 3</text>
    <text x="628" y="248" fill="#111827" font-size="20" font-weight="800">CTEs</text>
    <text x="628" y="274" fill="#6B7280" font-size="13">WITH x AS (…)</text>
    <text x="628" y="296" fill="#374151" font-family="Consolas, monospace" font-size="13">layered, readable logic</text>
    <text x="628" y="320" fill="#6B7280" font-size="12">multi-stage transformations</text>

    <!-- Pattern 4 -->
    <rect x="870" y="190" width="240" height="150" rx="16" fill="#FEF3C7" stroke="#FCD34D"/>
    <text x="888" y="220" fill="#92400E" font-size="13" font-weight="800">PATTERN 4</text>
    <text x="888" y="248" fill="#111827" font-size="20" font-weight="800">Window functions</text>
    <text x="888" y="274" fill="#6B7280" font-size="13">OVER (PARTITION BY …)</text>
    <text x="888" y="296" fill="#374151" font-family="Consolas, monospace" font-size="13">RANK, LAG, running totals</text>
    <text x="888" y="320" fill="#6B7280" font-size="12">top-N, MoM, cumulative</text>

    <!-- Arrows down to agent loop -->
    <path d="M210 348v22" stroke="#5B5BFF" stroke-width="4" stroke-linecap="round"/>
    <path d="M470 348v22" stroke="#5B5BFF" stroke-width="4" stroke-linecap="round"/>
    <path d="M730 348v22" stroke="#5B5BFF" stroke-width="4" stroke-linecap="round"/>
    <path d="M990 348v22" stroke="#5B5BFF" stroke-width="4" stroke-linecap="round"/>

    <!-- Agent loop band -->
    <rect x="90" y="380" width="1020" height="156" rx="18" fill="#0F172A"/>
    <text x="110" y="416" fill="#A5B4FC" font-size="14" font-weight="800" letter-spacing="2">AI AGENT WORKFLOW AROUND THE PATTERNS</text>
    <g font-size="15" font-weight="700">
      <rect x="110" y="436" width="220" height="74" rx="12" fill="#1E293B" stroke="#334155"/>
      <text x="124" y="464" fill="#E2E8F0" font-size="14" font-weight="800">1. Retrieve context</text>
      <text x="124" y="486" fill="#94A3B8" font-size="12.5">schema + bound KB definitions</text>
      <text x="124" y="504" fill="#94A3B8" font-size="12.5">"what active customer means"</text>

      <rect x="350" y="436" width="220" height="74" rx="12" fill="#1E293B" stroke="#334155"/>
      <text x="364" y="464" fill="#E2E8F0" font-size="14" font-weight="800">2. Plan</text>
      <text x="364" y="486" fill="#94A3B8" font-size="12.5">join keys · filters · grain</text>
      <text x="364" y="504" fill="#94A3B8" font-size="12.5">analyst approves before run</text>

      <rect x="590" y="436" width="220" height="74" rx="12" fill="#1E293B" stroke="#334155"/>
      <text x="604" y="464" fill="#E2E8F0" font-size="14" font-weight="800">3. Run SQL</text>
      <text x="604" y="486" fill="#94A3B8" font-size="12.5">read-only role, scoped grants</text>
      <text x="604" y="504" fill="#94A3B8" font-size="12.5">SQL is reviewable in the trace</text>

      <rect x="830" y="436" width="260" height="74" rx="12" fill="#1E293B" stroke="#334155"/>
      <text x="844" y="464" fill="#E2E8F0" font-size="14" font-weight="800">4. Verify + explain</text>
      <text x="844" y="486" fill="#94A3B8" font-size="12.5">sanity queries + evidence trail</text>
      <text x="844" y="504" fill="#94A3B8" font-size="12.5">analyst challenges anomalies</text>
    </g>
  </g>

  <text x="100" y="566" fill="#6B7280" font-family="Inter, Arial, sans-serif" font-size="16">InfiniSynapse — enterprise AI data analyst</text>
</svg>

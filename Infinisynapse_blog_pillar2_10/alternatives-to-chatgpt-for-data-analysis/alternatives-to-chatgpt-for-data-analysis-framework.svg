<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Alternatives to ChatGPT landscape</title>
  <desc id="desc">Four categories — peer LLMs, BI copilots, lakehouse-native, warehouse-connected data agents — mapped by audience, source, and audit posture.</desc>
  <rect width="1200" height="630" fill="#F8FAFC"/>
  <rect x="50" y="46" width="1100" height="538" rx="28" fill="#FFFFFF" stroke="#D9DEE8" stroke-width="2"/>
  <text x="100" y="110" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="800">Four categories of ChatGPT alternative</text>
  <text x="100" y="148" fill="#5B5BFF" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">Peer LLMs · BI copilots · lakehouse-native · warehouse agents</text>
  <g font-family="Inter, Arial, sans-serif">
    <rect x="90" y="200" width="300" height="180" rx="18" fill="#EEF2FF" stroke="#C7D2FE"/>
    <text x="110" y="234" fill="#4338CA" font-size="14" font-weight="800">CATEGORY 1-2</text>
    <text x="110" y="262" fill="#111827" font-size="20" font-weight="800">Peer LLM + BI copilot</text>
    <text x="110" y="296" fill="#6B7280" font-size="14">Claude · Gemini · Pulse · Power BI · ThoughtSpot</text>
    <rect x="450" y="200" width="300" height="180" rx="18" fill="#F5F3FF" stroke="#DDD6FE"/>
    <text x="470" y="234" fill="#6D28D9" font-size="14" font-weight="800">CATEGORY 3</text>
    <text x="470" y="262" fill="#111827" font-size="20" font-weight="800">Lakehouse-native</text>
    <text x="470" y="296" fill="#6B7280" font-size="14">Databricks Genie · Snowflake Cortex Analyst</text>
    <rect x="810" y="200" width="300" height="180" rx="18" fill="#ECFDF5" stroke="#BBF7D0"/>
    <text x="830" y="234" fill="#047857" font-size="14" font-weight="800">CATEGORY 4</text>
    <text x="830" y="262" fill="#111827" font-size="20" font-weight="800">Warehouse-connected agents</text>
    <text x="830" y="296" fill="#6B7280" font-size="14">InfiniSynapse · cross-source · audit trail</text>
    <path d="M394 290h50" stroke="#5B5BFF" stroke-width="6" stroke-linecap="round"/>
    <path d="M422 280l14 10-14 10" stroke="#5B5BFF" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M754 290h50" stroke="#5B5BFF" stroke-width="6" stroke-linecap="round"/>
    <path d="M782 280l14 10-14 10" stroke="#5B5BFF" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <rect x="90" y="416" width="1020" height="120" rx="16" fill="#F9FAFB" stroke="#E5E7EB"/>
    <text x="110" y="448" fill="#111827" font-size="15" font-weight="800">SIX SELECTION CRITERIA</text>
    <text x="110" y="476" fill="#374151" font-size="14" font-weight="600">Audience · source spread · existing semantic model · audit trail requirement</text>
    <text x="110" y="500" fill="#374151" font-size="14" font-weight="600">Recurring vs ad-hoc workflow · per-seat budget</text>
  </g>
  <text x="100" y="562" fill="#6B7280" font-family="Inter, Arial, sans-serif" font-size="16">InfiniSynapse — enterprise AI data analyst</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Financial services data analysis flow</title>
  <desc id="desc">Sources from core banking through market data feed a governed warehouse; analyst questions answered by AI agents with audit-grade evidence trail.</desc>
  <rect width="1200" height="630" fill="#F8FAFC"/>
  <rect x="50" y="46" width="1100" height="538" rx="28" fill="#FFFFFF" stroke="#D9DEE8" stroke-width="2"/>
  <text x="100" y="110" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="800">FSI data analysis: governed by construction</text>
  <text x="100" y="148" fill="#5B5BFF" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">Sources · governance · audit-grade answers</text>
  <g font-family="Inter, Arial, sans-serif">
    <rect x="90" y="200" width="300" height="180" rx="18" fill="#EEF2FF" stroke="#C7D2FE"/>
    <text x="110" y="234" fill="#4338CA" font-size="14" font-weight="800">STEP 1 · INGEST</text>
    <text x="110" y="262" fill="#111827" font-size="20" font-weight="800">Seven source classes</text>
    <text x="110" y="296" fill="#6B7280" font-size="14">core · payments · market · ledger · CRM · trade · risk</text>
    <rect x="450" y="200" width="300" height="180" rx="18" fill="#F5F3FF" stroke="#DDD6FE"/>
    <text x="470" y="234" fill="#6D28D9" font-size="14" font-weight="800">STEP 2 · GOVERN</text>
    <text x="470" y="262" fill="#111827" font-size="20" font-weight="800">Read-only + audit log</text>
    <text x="470" y="296" fill="#6B7280" font-size="14">SR 11-7 · EU AI Act · BCBS 239 · NIST AI RMF</text>
    <rect x="810" y="200" width="300" height="180" rx="18" fill="#ECFDF5" stroke="#BBF7D0"/>
    <text x="830" y="234" fill="#047857" font-size="14" font-weight="800">STEP 3 · ANSWER</text>
    <text x="830" y="262" fill="#111827" font-size="20" font-weight="800">Evidence trail per result</text>
    <text x="830" y="296" fill="#6B7280" font-size="14">plan · SQL · result · verification · sources</text>
    <path d="M394 290h50" stroke="#5B5BFF" stroke-width="6" stroke-linecap="round"/>
    <path d="M422 280l14 10-14 10" stroke="#5B5BFF" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M754 290h50" stroke="#5B5BFF" stroke-width="6" stroke-linecap="round"/>
    <path d="M782 280l14 10-14 10" stroke="#5B5BFF" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <rect x="90" y="416" width="1020" height="120" rx="16" fill="#F9FAFB" stroke="#E5E7EB"/>
    <text x="110" y="448" fill="#111827" font-size="15" font-weight="800">EIGHT RECURRING FSI QUESTIONS</text>
    <text x="110" y="476" fill="#374151" font-size="14" font-weight="600">P&L drift · transaction monitoring · credit risk migration · liquidity</text>
    <text x="110" y="500" fill="#374151" font-size="14" font-weight="600">customer concentration · regulatory reconciliation · model drift · operational loss</text>
  </g>
  <text x="100" y="562" fill="#6B7280" font-family="Inter, Arial, sans-serif" font-size="16">InfiniSynapse — enterprise AI data analyst</text>
</svg>